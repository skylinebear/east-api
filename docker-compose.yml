# EASTCREA Docker Compose Configuration
# 
# Quick Start:
#   1. docker compose up -d --build
#   2. Access at http://localhost:3000
#
# Using MySQL instead of PostgreSQL:
#   1. Comment out the postgres service and SQL_DSN line 15
#   2. Uncomment the mysql service and SQL_DSN line 16
#   3. Uncomment mysql in depends_on (line 28)
#   4. Uncomment mysql_data in volumes section (line 64)
#
# ⚠️  IMPORTANT: Change all default passwords before deploying to production!

services:
  east-api:
    image: eastcrea/east-api:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: east-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD:-123456}@postgres:5432/${POSTGRES_DB:-east_api} # ⚠️ IMPORTANT: Change these values in .env for production!
#      - SQL_DSN=root:${MYSQL_ROOT_PASSWORD:-123456}@tcp(mysql:3306)/${MYSQL_DATABASE:-east_api}  # Point to the mysql service, uncomment if using MySQL
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD:-123456}@redis:6379 # ⚠️ IMPORTANT: Change REDIS_PASSWORD in .env for production!
      - TZ=${TZ:-Asia/Shanghai}
      - ERROR_LOG_ENABLED=${ERROR_LOG_ENABLED:-true} # 是否启用错误日志记录 (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=${BATCH_UPDATE_ENABLED:-true}  # 是否启用批量更新 (Whether to enable batch update)
      - NODE_NAME=${NODE_NAME:-east-api-node-1}  # 节点名称，用于审计日志中标识节点身份；多节点/容器部署时建议设置 (Node name used in audit logs; recommended when running multiple instances or in containers)
      - SERVER_ADDRESS=${SERVER_ADDRESS:-} # 站点对外访问地址，例如 https://eastcrea.com (public site URL)
      - SESSION_SECRET=${SESSION_SECRET:-} # 建议在 .env 中设置固定值 (recommended to set in .env)
      - CRYPTO_SECRET=${CRYPTO_SECRET:-} # 使用 Redis 时建议设置固定值 (recommended when using Redis)
#      - STREAMING_TIMEOUT=300  # 流模式无响应超时时间，单位秒，默认120秒，如果出现空补全可以尝试改为更大值 （Streaming timeout in seconds, default is 120s. Increase if experiencing empty completions）
#      - SYNC_FREQUENCY=60  # Uncomment if regular database syncing is needed
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX  # Google Analytics 的测量 ID (Google Analytics Measurement ID)
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Umami 网站 ID (Umami Website ID)
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js  # Umami 脚本 URL，默认为官方地址 (Umami Script URL, defaults to official URL)

    depends_on:
      - redis
      - postgres
#      - mysql  # Uncomment if using MySQL
    networks:
      - east-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: east-api-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-123456}"]  # ⚠️ IMPORTANT: Change this password in .env for production!
    networks:
      - east-api-network

  postgres:
    image: postgres:15
    container_name: east-api-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}  # ⚠️ IMPORTANT: Change this password in .env for production!
      POSTGRES_DB: ${POSTGRES_DB:-east_api}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - east-api-network
#    ports:
#      - "5432:5432"  # Uncomment if you need to access PostgreSQL from outside Docker

#  mysql:
#    image: mysql:8.2
#    container_name: east-api-mysql
#    restart: always
#    environment:
#      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}  # ⚠️ IMPORTANT: Change this password in .env for production!
#      MYSQL_DATABASE: ${MYSQL_DATABASE:-east_api}
#    volumes:
#      - mysql_data:/var/lib/mysql
#    networks:
#      - east-api-network
#    ports:
#      - "3306:3306"  # Uncomment if you need to access MySQL from outside Docker

volumes:
  pg_data:
#  mysql_data:

networks:
  east-api-network:
    driver: bridge
